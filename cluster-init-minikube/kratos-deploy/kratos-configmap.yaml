apiVersion: v1
kind: ConfigMap
metadata:
  name: kratos-config
  namespace: kratos
data:
  kratos.yml: |
    version: v1.3.0

    dsn: env://DSN

    serve:
      public:
        base_url: http://192.168.50.200/auth/
        cors:
          enabled: true
          allowed_origins:
            - http://192.168.50.200
          allowed_methods:
            - POST
            - GET
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          allowed_headers:
            - Authorization
            - Content-Type
            - Cookie
          exposed_headers:
            - Content-Type
            - Set-Cookie
          allow_credentials: true
        host: 0.0.0.0
        port: 4433
      admin:
        base_url: http://kratos-admin.kratos.svc.cluster.local:4434/
        host: 0.0.0.0
        port: 4434

    session:
      cookie:
        domain: 192.168.50.200
        path: /
        same_site: Lax
        persistent: true
      lifespan: 24h
      earliest_possible_extend: 1h
      whoami:
        required_aal: aal1

    selfservice:
      default_browser_return_url: http://192.168.50.200/
      allowed_return_urls:
        - http://192.168.50.200
        - http://192.168.50.200/callback

      methods:
        password:
          enabled: true
          config:
            haveibeenpwned_enabled: false
        totp:
          config:
            issuer: MyApp
          enabled: true
        lookup_secret:
          enabled: true
        link:
          enabled: true

      flows:
        error:
          ui_url: http://192.168.50.200/error
        settings:
          ui_url: http://192.168.50.200/settings
          privileged_session_max_age: 15m
          required_aal: highest_available
          after:
            default_browser_return_url: http://192.168.50.200/login
            password:
              hooks:
                - hook: revoke_active_sessions
        recovery:
          enabled: true
          ui_url: http://192.168.50.200/recovery
          use: link
          after:
            default_browser_return_url: http://192.168.50.200/settings
        verification:
          enabled: false
          ui_url: http://192.168.50.200/verification
          use: link
          after:
            default_browser_return_url: http://192.168.50.200/
        logout:
          after:
            default_browser_return_url: http://192.168.50.200/login
        login:
          ui_url: http://192.168.50.200/login
          lifespan: 10m
          after:
            oidc:
              default_browser_return_url: http://192.168.50.200/
        registration:
          lifespan: 10m
          ui_url: http://192.168.50.200/registration
          after:
            oidc:
              default_browser_return_url: http://192.168.50.200/
              hooks:
                - hook: session
            password:
              hooks:
                - hook: session

    log:
      level: debug
      format: text
      leak_sensitive_values: true

    secrets:
      cookie:
        - A1B2C3D4E5F6G7H8I9J0K1L2M3N4O5P6
      cipher:
        - Z9Y8X7W6V5U4T3S2R1Q0P9O8N7M6L5K4

    ciphers:
      algorithm: xchacha20-poly1305

    hashers:
      algorithm: bcrypt
      bcrypt:
        cost: 8

    identity:
      default_schema_id: default
      schemas:
        - id: default
          url: file:///etc/config/kratos/identity.schema.json

    courier:
      smtp:
        connection_uri: smtp://mailhog.kratos.svc.cluster.local:1025/?disable_starttls=true

  identity.schema.json: |
    {
      "$id": "https://schemas.ory.sh/presets/kratos/identity.email.schema.json",
      "$schema": "http://json-schema.org/draft-07/schema#",
      "title": "Person",
      "type": "object",
      "properties": {
        "traits": {
          "type": "object",
          "properties": {
            "email": {
              "type": "string",
              "format": "email",
              "title": "E-Mail",
              "minLength": 3,
              "ory.sh/kratos": {
                "credentials": {
                  "password": {
                    "identifier": true
                  }
                },
                "verification": {
                  "via": "email"
                },
                "recovery": {
                  "via": "email"
                }
              }
            },
            "username": {
              "type": ["string", "null"],
              "title": "Username",
              "ory.sh/kratos": {
                "credentials": {
                  "password": {
                    "identifier": false
                  }
                }
              }
            },
            "geo_location": {
              "type": "string",
              "title": "Geographic Location"
            }
          },
          "required": ["email"],
          "additionalProperties": false
        }
      }
    }
